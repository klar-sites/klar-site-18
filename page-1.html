<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraFlow — Liquid Glass iOS App</title>
  <meta name="description" content="AuraFlow is a polished iOS app landing page with a liquid glass design system, frosted controls, glossy buttons, and app-focused sections.">
  <style>
    :root {
      --iosglass-p9r-ink: #07101f;
      --iosglass-p9r-muted: rgba(7, 16, 31, 0.64);
      --iosglass-p9r-softText: rgba(7, 16, 31, 0.48);
      --iosglass-p9r-whiteCore: rgba(255, 255, 255, 0.72);
      --iosglass-p9r-whiteEdge: rgba(255, 255, 255, 0.92);
      --iosglass-p9r-glassFill: rgba(244, 251, 255, 0.48);
      --iosglass-p9r-glassDeep: rgba(198, 215, 226, 0.34);
      --iosglass-p9r-stroke: rgba(115, 139, 156, 0.28);
      --iosglass-p9r-shadow: rgba(45, 76, 99, 0.22);
      --iosglass-p9r-shadowDeep: rgba(28, 54, 78, 0.32);
      --iosglass-p9r-red: #ff3b30;
      --iosglass-p9r-orange: #ff9f0a;
      --iosglass-p9r-blue: #007aff;
      --iosglass-p9r-cyan: #32d8ff;
      --iosglass-p9r-green: #34c759;
      --iosglass-p9r-purple: #af52de;
      --iosglass-p9r-pink: #ff4fd8;
      --iosglass-p9r-radiusHuge: 44px;
      --iosglass-p9r-radiusLarge: 32px;
      --iosglass-p9r-radiusMedium: 24px;
      --iosglass-p9r-radiusSmall: 18px;
      --iosglass-p9r-maxWidth: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Segoe UI, sans-serif;
      color: var(--iosglass-p9r-ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 102, 102, 0.20), transparent 28%),
        radial-gradient(circle at 82% 13%, rgba(50, 216, 255, 0.24), transparent 30%),
        radial-gradient(circle at 72% 58%, rgba(175, 82, 222, 0.18), transparent 34%),
        linear-gradient(135deg, #edf5f7 0%, #f8fbfa 42%, #eaf2f8 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.44) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.44) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      opacity: 0.55;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.88), transparent 18%),
        radial-gradient(circle at 70% 75%, rgba(255, 255, 255, 0.62), transparent 16%);
      filter: blur(58px);
      opacity: 0.72;
      z-index: -1;
      animation: iosglass-p9r-atmosphereDrift 16s ease-in-out infinite alternate;
    }

    @keyframes iosglass-p9r-atmosphereDrift {
      from {
        transform: translate3d(-2%, -1%, 0) scale(1);
      }
      to {
        transform: translate3d(2%, 1%, 0) scale(1.05);
      }
    }

    @keyframes iosglass-p9r-softFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    @keyframes iosglass-p9r-pulseGlow {
      0%, 100% {
        opacity: 0.55;
        transform: scale(1);
      }
      50% {
        opacity: 0.92;
        transform: scale(1.06);
      }
    }

    .iosglass-p9r-pageShell {
      width: min(100% - 36px, var(--iosglass-p9r-maxWidth));
      margin: 0 auto;
      padding: 24px 0 64px;
    }

    .iosglass-p9r-topDock {
      position: sticky;
      top: 18px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.62), rgba(232, 245, 252, 0.34));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -18px 28px rgba(119, 149, 164, 0.10),
        0 22px 54px rgba(39, 67, 88, 0.16);
      backdrop-filter: blur(28px) saturate(1.45);
      -webkit-backdrop-filter: blur(28px) saturate(1.45);
    }

    .iosglass-p9r-brandCluster {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .iosglass-p9r-brandGlyph {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background:
        radial-gradient(circle at 26% 20%, rgba(255, 255, 255, 0.95), transparent 18%),
        linear-gradient(135deg, var(--iosglass-p9r-blue), var(--iosglass-p9r-cyan) 48%, var(--iosglass-p9r-purple));
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.72),
        inset 0 -10px 16px rgba(0, 48, 120, 0.26),
        0 12px 26px rgba(0, 122, 255, 0.25);
      position: relative;
      flex: 0 0 auto;
    }

    .iosglass-p9r-brandGlyph::after {
      content: "";
      position: absolute;
      width: 15px;
      height: 15px;
      right: 7px;
      bottom: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.80);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.95);
    }

    .iosglass-p9r-brandName {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .iosglass-p9r-navRail {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .iosglass-p9r-navLink {
      color: rgba(7, 16, 31, 0.68);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.94rem;
      padding: 11px 14px;
      border-radius: 999px;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease;
    }

    .iosglass-p9r-navLink:hover {
      color: var(--iosglass-p9r-ink);
      background: rgba(255, 255, 255, 0.58);
      transform: translateY(-1px);
    }

    .iosglass-p9r-downloadPill {
      appearance: none;
      border: 0;
      cursor: pointer;
      color: white;
      text-decoration: none;
      font-weight: 850;
      font-size: 0.94rem;
      padding: 13px 18px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.88), transparent 18%),
        linear-gradient(135deg, #1f8fff, #22d4ff 52%, #8d5cff);
      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.72),
        inset 0 -13px 18px rgba(28, 44, 148, 0.24),
        0 16px 34px rgba(0, 122, 255, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease;
      white-space: nowrap;
    }

    .iosglass-p9r-downloadPill:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.82),
        inset 0 -13px 18px rgba(28, 44, 148, 0.24),
        0 22px 42px rgba(0, 122, 255, 0.34);
    }

    .iosglass-p9r-introGrid {
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(320px, 0.96fr);
      gap: 34px;
      align-items: center;
      padding: 86px 0 70px;
    }

    .iosglass-p9r-eyebrowCapsule {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      padding: 10px 15px 10px 11px;
      border-radius: 999px;
      color: rgba(7, 16, 31, 0.78);
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.90),
        0 14px 34px rgba(56, 85, 106, 0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .iosglass-p9r-eyebrowOrb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 24%, white, transparent 22%),
        linear-gradient(135deg, var(--iosglass-p9r-green), var(--iosglass-p9r-cyan));
      box-shadow: 0 8px 18px rgba(52, 199, 89, 0.26);
    }

    .iosglass-p9r-mainHeadline {
      margin: 24px 0 18px;
      max-width: 780px;
      font-size: clamp(3.2rem, 8vw, 7.45rem);
      line-height: 0.88;
      letter-spacing: -0.08em;
      font-weight: 900;
    }

    .iosglass-p9r-gradientWord {
      color: transparent;
      background: linear-gradient(100deg, #07101f 8%, #007aff 42%, #32d8ff 58%, #af52de 82%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .iosglass-p9r-introCopy {
      max-width: 640px;
      margin: 0;
      color: var(--iosglass-p9r-muted);
      font-size: clamp(1.1rem, 2vw, 1.42rem);
      line-height: 1.48;
      letter-spacing: -0.035em;
      font-weight: 560;
    }

    .iosglass-p9r-actionCluster {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-top: 30px;
    }

    .iosglass-p9r-fireButton {
      appearance: none;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      padding: 0 24px;
      border-radius: 999px;
      color: white;
      font-weight: 900;
      font-size: 1.04rem;
      text-decoration: none;
      letter-spacing: -0.03em;
      background:
        radial-gradient(circle at 22% 20%, rgba(255, 255, 255, 0.88), transparent 17%),
        linear-gradient(135deg, var(--iosglass-p9r-red), #ff6b2b 54%, #ffd36b);
      box-shadow:
        inset 0 2px 7px rgba(255, 255, 255, 0.58),
        inset 0 -18px 22px rgba(154, 18, 18, 0.20),
        0 22px 42px rgba(255, 59, 48, 0.28);
      transition: transform 180ms ease;
    }

    .iosglass-p9r-fireButton:hover {
      transform: translateY(-3px) scale(1.01);
    }

    .iosglass-p9r-clearButton {
      appearance: none;
      cursor: pointer;
      min-height: 62px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.80);
      color: var(--iosglass-p9r-ink);
      font-weight: 850;
      font-size: 1.04rem;
      letter-spacing: -0.03em;
      background:
        radial-gradient(circle at 15% 16%, rgba(255, 255, 255, 0.90), transparent 16%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.56), rgba(231, 244, 251, 0.36));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.96),
        inset 0 -18px 24px rgba(102, 132, 148, 0.10),
        0 18px 38px rgba(49, 77, 98, 0.14);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: transform 180ms ease;
    }

    .iosglass-p9r-clearButton:hover {
      transform: translateY(-3px);
    }

    .iosglass-p9r-metricStrip {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .iosglass-p9r-metricBubble {
      min-width: 146px;
      padding: 16px 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.74);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.90),
        0 14px 34px rgba(56, 85, 106, 0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .iosglass-p9r-metricNumber {
      display: block;
      font-size: 1.46rem;
      font-weight: 920;
      letter-spacing: -0.06em;
    }

    .iosglass-p9r-metricLabel {
      display: block;
      margin-top: 2px;
      color: var(--iosglass-p9r-softText);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .iosglass-p9r-deviceStage {
      position: relative;
      min-height: 680px;
      display: grid;
      place-items: center;
    }

    .iosglass-p9r-deviceAura {
      position: absolute;
      width: 78%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(50, 216, 255, 0.28), transparent 55%),
        radial-gradient(circle at 38% 28%, rgba(255, 79, 216, 0.18), transparent 34%);
      filter: blur(6px);
      animation: iosglass-p9r-pulseGlow 5s ease-in-out infinite;
    }

    .iosglass-p9r-phoneFrame {
      position: relative;
      width: min(355px, 86vw);
      aspect-ratio: 0.49;
      border-radius: 58px;
      padding: 14px;
      background:
        radial-gradient(circle at 22% 10%, rgba(255, 255, 255, 0.95), transparent 16%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.70), rgba(207, 225, 235, 0.36));
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.98),
        inset 0 -26px 38px rgba(96, 127, 146, 0.20),
        0 36px 80px rgba(35, 65, 90, 0.22);
      backdrop-filter: blur(34px) saturate(1.4);
      -webkit-backdrop-filter: blur(34px) saturate(1.4);
      animation: iosglass-p9r-softFloat 7s ease-in-out infinite;
    }

    .iosglass-p9r-phoneFrame::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 108px;
      height: 31px;
      border-radius: 999px;
      background: rgba(7, 16, 31, 0.88);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.20);
      z-index: 3;
    }

    .iosglass-p9r-phoneScreen {
      position: relative;
      height: 100%;
      border-radius: 46px;
      overflow: hidden;
      padding: 60px 18px 18px;
      background:
        radial-gradient(circle at 18% 15%, rgba(255, 255, 255, 0.82), transparent 24%),
        radial-gradient(circle at 76% 30%, rgba(50, 216, 255, 0.26), transparent 30%),
        linear-gradient(160deg, rgba(245, 251, 255, 0.92), rgba(225, 238, 247, 0.72));
      border: 1px solid rgba(255, 255, 255, 0.78);
    }

    .iosglass-p9r-phoneStatus {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(7, 16, 31, 0.62);
      font-weight: 800;
      font-size: 0.78rem;
      margin-bottom: 18px;
    }

    .iosglass-p9r-phoneGreeting {
      font-size: 1.62rem;
      line-height: 1.02;
      font-weight: 920;
      letter-spacing: -0.06em;
      margin: 0 0 12px;
    }

    .iosglass-p9r-phoneSearch {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        0 12px 24px rgba(39, 67, 88, 0.10);
      color: rgba(7, 16, 31, 0.54);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .iosglass-p9r-phoneTask {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-top: 11px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        0 14px 26px rgba(39, 67, 88, 0.11);
    }

    .iosglass-p9r-phoneTaskOrb {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 28% 20%, white, transparent 20%),
        linear-gradient(135deg, var(--iosglass-p9r-blue), var(--iosglass-p9r-cyan));
      box-shadow: 0 10px 22px rgba(0, 122, 255, 0.22);
    }

    .iosglass-p9r-phoneTaskOrbWarm {
      background:
        radial-gradient(circle at 28% 20%, white, transparent 20%),
        linear-gradient(135deg, var(--iosglass-p9r-red), var(--iosglass-p9r-orange));
      box-shadow: 0 10px 22px rgba(255, 59, 48, 0.20);
    }

    .iosglass-p9r-phoneTaskOrbFresh {
      background:
        radial-gradient(circle at 28% 20%, white, transparent 20%),
        linear-gradient(135deg, var(--iosglass-p9r-green), var(--iosglass-p9r-cyan));
      box-shadow: 0 10px 22px rgba(52, 199, 89, 0.20);
    }

    .iosglass-p9r-phoneTaskName {
      display: block;
      font-size: 0.95rem;
      font-weight: 850;
      letter-spacing: -0.03em;
    }

    .iosglass-p9r-phoneTaskMeta {
      display: block;
      color: rgba(7, 16, 31, 0.48);
      font-size: 0.78rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .iosglass-p9r-phoneCheck {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--iosglass-p9r-green), #78f0a2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65), 0 8px 16px rgba(52, 199, 89, 0.22);
      font-weight: 900;
    }

    .iosglass-p9r-phoneFocusPanel {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      min-height: 150px;
      border-radius: 32px;
      padding: 18px;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,.84), transparent 20%),
        linear-gradient(135deg, rgba(0, 122, 255, 0.78), rgba(50, 216, 255, 0.72) 50%, rgba(175, 82, 222, 0.70));
      color: white;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.58),
        inset 0 -20px 24px rgba(26, 39, 110, 0.16),
        0 20px 42px rgba(0, 122, 255, 0.24);
    }

    .iosglass-p9r-phoneFocusKicker {
      display: block;
      opacity: 0.82;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .iosglass-p9r-phoneFocusTitle {
      margin: 6px 0 16px;
      font-size: 1.28rem;
      font-weight: 920;
      letter-spacing: -0.05em;
    }

    .iosglass-p9r-phoneFocusBar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.30);
      overflow: hidden;
    }

    .iosglass-p9r-phoneFocusBar::after {
      content: "";
      display: block;
      width: 74%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255,255,255,.84);
    }

    .iosglass-p9r-floatingChip {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 850;
      letter-spacing: -0.03em;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        inset 0 -16px 20px rgba(93, 125, 145, 0.10),
        0 18px 36px rgba(39, 67, 88, 0.16);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .iosglass-p9r-floatingChipOne {
      left: 0;
      top: 92px;
      animation: iosglass-p9r-softFloat 6s ease-in-out infinite;
    }

    .iosglass-p9r-floatingChipTwo {
      right: 0;
      bottom: 152px;
      animation: iosglass-p9r-softFloat 7s ease-in-out infinite reverse;
    }

    .iosglass-p9r-floatingDot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 24%, white, transparent 24%),
        linear-gradient(135deg, var(--iosglass-p9r-pink), var(--iosglass-p9r-purple));
      box-shadow: 0 8px 18px rgba(175, 82, 222, 0.24);
    }

    .iosglass-p9r-floatingDotBlue {
      background:
        radial-gradient(circle at 30% 24%, white, transparent 24%),
        linear-gradient(135deg, var(--iosglass-p9r-blue), var(--iosglass-p9r-cyan));
      box-shadow: 0 8px 18px rgba(0, 122, 255, 0.24);
    }

    .iosglass-p9r-controlDeck {
      padding: 24px;
      border-radius: var(--iosglass-p9r-radiusHuge);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.40), rgba(232, 245, 252, 0.26));
      border: 1px solid rgba(255, 255, 255, 0.64);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        0 30px 70px rgba(39, 67, 88, 0.14);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .iosglass-p9r-controlGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .iosglass-p9r-glossTile {
      position: relative;
      overflow: hidden;
      min-height: 128px;
      padding: 24px;
      border-radius: var(--iosglass-p9r-radiusLarge);
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 255, 255, 0.96), transparent 18%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.58), rgba(229, 241, 248, 0.36));
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.96),
        inset 0 -22px 28px rgba(97, 125, 145, 0.12),
        0 18px 38px rgba(44, 72, 95, 0.12);
      backdrop-filter: blur(24px) saturate(1.35);
      -webkit-backdrop-filter: blur(24px) saturate(1.35);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }

    .iosglass-p9r-glossTile:hover {
      transform: translateY(-5px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.98),
        inset 0 -22px 28px rgba(97, 125, 145, 0.12),
